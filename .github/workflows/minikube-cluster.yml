name: Minikube Cluster Setup

on:
  pull_request:
    branches:
      - main

jobs:
  minikube:
    runs-on: [my_runner]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Установка Minikube (БЕЗ SUDO)
      - name: Install Minikube
        run: |
          mkdir -p $HOME/.local/bin
          curl -Lo $HOME/.local/bin/minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x $HOME/.local/bin/minikube
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      # Установка kubectl (БЕЗ SUDO)
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mkdir -p $HOME/.local/bin
          mv kubectl $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      # ✅ Удаляем существующий кластер
      - name: Delete existing cluster
        run: |
          minikube delete || true
          # Очищаем кэш
          rm -rf ~/.minikube
          rm -rf ~/.kube
      
      # Запуск Minikube с нужной версией
      - name: Start Minikube
        run: |
          minikube start --driver=docker --cpus=2 --memory=4096 --kubernetes-version=v1.28.0
          minikube status
      
      # Проверка
      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A
      
      # Остановка (очистка)
      - name: Stop Minikube
        if: always()
        run: minikube stop